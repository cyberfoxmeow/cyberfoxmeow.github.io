<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			body,div{
				margin: 0;
				padding: 0;
			}
			#div1{
				float:left;
				margin-left: 10px;
				margin-top: 10px;
				width: 100px;
				height: 100px;
				background-color: #900;
				display: inline;/* ONLY for IE*/
			}
			
			#div2{
				float:left;
				margin-left: 10px;
				margin-top: 10px;
				width: 150px;
				height: 100px;
				background-color: #090;
			}
			#div3{
				width: 100px;
				height: 100px;
				background-color: #009;
				margin-left: 10px;
				margin-top: 10px;
			}
			
			.clear{
				clear: both;/*在chrome中，让后续的块重启一行*/
			}
		</style>
	</head>
	<body>
		<div id="div1"></div>
		<div id="div2"></div>
		<!--IE 在浮动中的一个bug
			1. 块元素
			2. 使用float:left;
			3. margin-left不等于（≠）0
			margin-left会double --/> 块变内联display: inline;
			-->
		<div class="clear"></div>	<!--换行-->
		<div id="div3"></div>
		
	</body>
</html>
