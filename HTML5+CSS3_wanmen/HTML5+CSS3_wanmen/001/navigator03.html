<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title></title>
		<style type="text/css">
			body,div,ul,li{
				margin: 0;
				padding: 0;
			}
			
			
			#nav{
				width: 960px;
				height: 35px;
				background-color: #E7E7E7;
				margin: 0 auto;/*居中*/
				margin-top: 30px;
				
			}
			
			#nav ul{
				width: 960px;
				height: 35px;
			}
			
			#nav ul li{
				float:left;
				list-style: none;
				/* width: 100px;*/
				background-color: #646464;
				/* background-image: url(img/); */
				height: 35px;
				text-align: center;/*水平居中*/
				line-height: 35px;/*垂直居中*/
				/* padding: 0 10px; */
				/*border: 1px solid #000;*/
				margin-right: 1px;
			}
			
			#nav ul li a {
				font-size: 14px;
				color: #fff;
				text-decoration: none;
				display: block;
				float: left;/* for IE */
				height: 35px;
				padding: 0 10px;
			}
			
			#nav ul li a:hover {
				background-color: #e7e7e7;
				color: #8790a1;
				font-size: 15px;
			}
		</style>
	</head>
	<body>
		<div id="nav">
			<ul>
				<li><a href="https://www.alibabagroup.com/en/global/home">阿里巴巴</a></li>
				<li><a href="#">腾讯</a></li>
				<li><a href="#">百度</a></li>
				<li><a href="#">小米</a></li>
				<li><a href="#">今日头条</a></li>
				<li><a href="#">微软</a></li>
			</ul>
			
			
		</div>
	</body>
</html>
