		<!--如果是布尔值的属性，那么-->
		<input type="checkbox" checked="true"/> abcde<br/>

		<!--只写属性，没有属性值，代表属性值为： true-->
		<input type="checkbox"   />2<br/>
		<!--没有属性，代表属性值为：false-->
		<input type="checkbox" checked="checked"  />3<br/>
		<!--属性值等于属性值名称，代表属性值为true-->
		<input type="checkbox" checked=""  />4<br/>
		<!--属性值等于空字符串，代表属性值为true-->
